services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: lgapp
      POSTGRES_PASSWORD: lgapp
      POSTGRES_DB: lgapp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lgapp -d lgapp"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
