name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    # A real Postgres, not SQLite — the importer and review sync rely on Postgres-specific
    # upserts, so testing against anything else would test code we don't ship.
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: lgapp
          POSTGRES_PASSWORD: lgapp
          POSTGRES_DB: lgapp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lgapp -d lgapp"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      LGAPP_ENV: ci
      LGAPP_DATABASE_URL: postgresql+asyncpg://lgapp:lgapp@localhost:5432/lgapp

    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: api/uv.lock

      - run: uv sync --locked

      - name: Lint
        run: uv run ruff check .

      - name: Format
        run: uv run ruff format --check .

      - name: Typecheck
        run: uv run mypy src

      - name: Test
        run: uv run pytest -q

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc -b --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  # The web client's types are generated from the API's OpenAPI document. If someone
  # changes a response model without regenerating, this fails here rather than at
  # runtime in a browser.
  api-types-are-current:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: api/uv.lock

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Regenerate types from the live schema
        working-directory: api
        run: |
          uv sync --locked
          uv run python -m lgapp.openapi > ../web/openapi.json

      - name: Fail if the committed types are stale
        working-directory: web
        run: |
          npx openapi-typescript openapi.json -o src/lib/api-types.ts
          git diff --exit-code -- openapi.json src/lib/api-types.ts \
            || { echo "::error::API types are stale. Run 'npm run gen:api' in web/ and commit."; exit 1; }
